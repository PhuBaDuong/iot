# =============================================================================
# Production overrides
# =============================================================================

api-gateway:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  ingress:
    hosts:
      - host: smarthome.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: production-tls
        hosts:
          - smarthome.example.com

sensor-simulator:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 384Mi
    limits:
      cpu: "1"
      memory: 768Mi

