api-gateway:
  replicaCount: 1
  ingress:
    hosts:
      - host: staging.smarthome.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: staging-tls
        hosts:
          - staging.smarthome.example.com

