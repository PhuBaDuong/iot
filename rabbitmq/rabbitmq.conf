# Plain AMQP (local dev convenience)
listeners.tcp.default = 5672

# TLS listener
listeners.ssl.default = 5671
ssl_options.cacertfile = /certs/ca.pem
ssl_options.certfile   = /certs/server.pem
ssl_options.keyfile    = /certs/server-key.pem
ssl_options.verify     = verify_none
ssl_options.fail_if_no_peer_cert = false
ssl_options.versions.1 = tlsv1.3
ssl_options.versions.2 = tlsv1.2

# Management
management.tcp.port = 15672

# Import users/permissions/topology on startup
load_definitions = /etc/rabbitmq/definitions.json

# Allow non-localhost logins for all users
loopback_users = none
