# =============================================================================
# Gateway Service Configuration
# =============================================================================
# This service is the entry point for all sensor data. It:
# 1. Consumes raw sensor readings from RabbitMQ
# 2. Validates the data format and values
# 3. Detects anomalies based on configured thresholds
# 4. Routes data to appropriate downstream queues
# =============================================================================

server:
  port: 8082
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE:}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: PKCS12
    client-auth: ${SSL_CLIENT_AUTH:none}
    trust-store: ${SSL_TRUSTSTORE:}
    trust-store-password: ${SSL_TRUSTSTORE_PASSWORD:changeit}
    trust-store-type: PKCS12

spring:
  application:
    name: gateway-service

  # ---------------------------------------------------------------------------
  # RabbitMQ Configuration
  # ---------------------------------------------------------------------------
  # LEARNING NOTE: RabbitMQ Connection
  # ----------------------------------
  # Spring AMQP uses these settings to connect to RabbitMQ.
  # In production, use environment variables or a secrets manager:
  #   SPRING_RABBITMQ_HOST, SPRING_RABBITMQ_USERNAME, etc.
  # ---------------------------------------------------------------------------
  rabbitmq:
    # Credentials are externalized; defaults are for local development only.
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:smarthome}
    password: ${RABBITMQ_PASSWORD:smarthome123}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:false}
      trust-store: ${RABBITMQ_TRUSTSTORE:}
      trust-store-password: ${RABBITMQ_TRUSTSTORE_PASSWORD:}
      trust-store-type: PKCS12
      algorithm: TLSv1.3
    connection-timeout: 10s
    # Publisher confirms/returns detect broker-side delivery failures.
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
      retry:
        enabled: true
        initial-interval: 1s
        max-attempts: 3
        multiplier: 2.0
    # Listener retry: after max-attempts the RejectAndDontRequeueRecoverer
    # routes the message to the dead-letter exchange.
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1s
          max-attempts: 3
          max-interval: 10s
          multiplier: 2.0

  # ---------------------------------------------------------------------------
  # Redis: dedup, rate limiting, device-status cache, dynamic thresholds
  # ---------------------------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  # ---------------------------------------------------------------------------
  # Security: OAuth2 resource server (Phase 3A). Validates IAM-issued RS256 JWTs
  # locally via JWKS (lazy fetch on first token, so no startup coupling to IAM)
  # and checks the token issuer.
  # ---------------------------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IAM_ISSUER:http://localhost:9000}
          jwk-set-uri: ${IAM_ISSUER:http://localhost:9000}/oauth2/jwks

  # ---------------------------------------------------------------------------
  # SSL Bundle: used by RestClient for mTLS to other services (Phase 3.7).
  # Only active when SSL_ENABLED=true (Docker Compose); empty defaults are
  # harmless — the bundle is not resolved unless explicitly requested.
  # ---------------------------------------------------------------------------
  ssl:
    bundle:
      jks:
        internal:
          keystore:
            location: ${SSL_KEYSTORE:}
            password: ${SSL_KEYSTORE_PASSWORD:changeit}
            type: PKCS12
          truststore:
            location: ${SSL_TRUSTSTORE:}
            password: ${SSL_TRUSTSTORE_PASSWORD:changeit}
            type: PKCS12

  # Placeholder for centralized secrets management (enabled in Phase 4):
  #   config:
  #     import: optional:vault://

# ---------------------------------------------------------------------------
# Device Registry (Phase 2): base URL used to validate the source device of
# each reading. Overridden in containers via DEVICE_REGISTRY_URL.
# ---------------------------------------------------------------------------
device-registry:
  base-url: ${DEVICE_REGISTRY_URL:http://localhost:8084}

# =============================================================================
# Management / Observability (Actuator + Prometheus + Tracing)
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,rabbit,redis
        liveness:
          include: livenessState
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  health:
    circuitbreakers:
      enabled: true

# =============================================================================
# Resilience4j: circuit breakers + retry for outbound calls (OutboundPublisher)
# =============================================================================
# The "rabbitPublisher" instance guards publishes to RabbitMQ; the same named
# instances will be reused for the Device Registry REST calls added in Phase 2.
resilience4j:
  circuitbreaker:
    instances:
      rabbitPublisher:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      # Guards device-validation REST calls to the Device Registry. When the
      # registry is unhealthy the breaker opens and lookups fail open (UNVERIFIED).
      deviceRegistryBreaker:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      rabbitPublisher:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      deviceRegistryBreaker:
        max-attempts: 2
        wait-duration: 200ms

# =============================================================================
# Gateway features: Redis (dedup, rate limiting), DLQ monitor, and thresholds
# =============================================================================
# LEARNING NOTE: Externalized Configuration
# -----------------------------------------
# Using @ConfigurationProperties, the threshold values can be:
# 1. Overridden via environment variables (GATEWAY_THRESHOLDS_TEMPERATURE_MIN)
# 2. Changed without code modification
# 3. Different per environment (dev, staging, prod)
#
# These thresholds define "normal" operating ranges for sensors.
# Readings outside these ranges trigger anomaly alerts. At runtime they can be
# overridden in Redis via PUT /api/gateway/thresholds/{sensorType}.
# =============================================================================
gateway:
  dedup:
    ttl-seconds: 300
  rate-limit:
    max-per-minute: 120
  dlq-monitor:
    interval: 60000
  thresholds:
    temperature:
      min: 15.0
      max: 30.0
    humidity:
      min: 30.0
      max: 70.0
    light:
      min: 0.0
      max: 10000.0
    pressure:
      min: 950.0
      max: 1050.0

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level:
    root: INFO
    com.smarthome.gateway: DEBUG
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

