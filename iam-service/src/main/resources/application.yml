# =============================================================================
# IAM Service Configuration (Phase 3A)
# =============================================================================
# Spring Authorization Server (OAuth 2.1 / OIDC). Issues RS256 JWTs, manages
# users/roles in the smarthome_iam database, and serves its public keys at
# /oauth2/jwks for resource servers to validate tokens locally.
# =============================================================================

server:
  port: 9000

spring:
  application:
    name: iam-service

  # ---------------------------------------------------------------------------
  # Relational store: the "smarthome_iam" database on the shared TimescaleDB/Postgres
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smarthome_iam}
    username: ${DB_USERNAME:smarthome}
    password: ${DB_PASSWORD:smarthome123}
  jpa:
    hibernate:
      # Hibernate manages the IAM schema (users/roles/user_roles); reference data
      # (the 3 roles + bootstrap admin) is seeded idempotently by DataInitializer.
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  # ---------------------------------------------------------------------------
  # Authorization Server issuer. Must be the externally reachable base URL so the
  # "iss" claim and JWKS/OIDC discovery URLs resolve for resource servers.
  # ---------------------------------------------------------------------------
  security:
    oauth2:
      authorizationserver:
        issuer: ${IAM_ISSUER:http://localhost:9000}

# =============================================================================
# Management / Observability (Actuator + Prometheus + Tracing)
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level:
    root: INFO
    com.smarthome.iam: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
