# =============================================================================
# Notification Service Configuration
# =============================================================================
server:
  port: 8086
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE:}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: PKCS12
    client-auth: ${SSL_CLIENT_AUTH:none}
    trust-store: ${SSL_TRUSTSTORE:}
    trust-store-password: ${SSL_TRUSTSTORE_PASSWORD:changeit}
    trust-store-type: PKCS12

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notifications}
    username: ${DB_USERNAME:smarthome}
    password: ${DB_PASSWORD:smarthome123}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:smarthome}
    password: ${RABBITMQ_PASSWORD:smarthome123}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:false}
      trust-store: ${RABBITMQ_TRUSTSTORE:}
      trust-store-password: ${RABBITMQ_TRUSTSTORE_PASSWORD:}
      trust-store-type: PKCS12
      algorithm: TLSv1.3
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1s
          max-attempts: 3
          max-interval: 10s
          multiplier: 2.0

  # ---------------------------------------------------------------------------
  # Security: OAuth2 resource server. Validates IAM-issued RS256 JWTs locally
  # via JWKS (lazy fetch on first token, so no startup coupling to IAM).
  # ---------------------------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IAM_ISSUER:http://localhost:9000}
          jwk-set-uri: ${IAM_ISSUER:http://localhost:9000}/oauth2/jwks

# =============================================================================
# Actuator / Observability
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,rabbit
        liveness:
          include: livenessState
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# =============================================================================
# Notification behavior
# =============================================================================
notification:
  dedup:
    window-seconds: ${NOTIFICATION_DEDUP_WINDOW:300}

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level:
    root: INFO
    com.smarthome.notification: DEBUG
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
