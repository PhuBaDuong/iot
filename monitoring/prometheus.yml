# =============================================================================
# Prometheus scrape configuration
# =============================================================================
# Scrapes the Spring Boot Actuator Prometheus endpoint of each service over
# HTTPS (Phase 3.7 mTLS). Uses insecure_skip_verify because the services use
# self-signed certificates issued by the SmartHome Dev CA.
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway-service
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway-service:8082']

  - job_name: processing-service
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['processing-service:8083']

  - job_name: sensor-simulator-service
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['sensor-simulator-service:8081']

  - job_name: device-registry-service
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['device-registry-service:8084']

  - job_name: history-service
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['history-service:8085']

  - job_name: iam-service
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['iam-service:9000']

  - job_name: notification-service
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:8086']

  - job_name: api-gateway
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
